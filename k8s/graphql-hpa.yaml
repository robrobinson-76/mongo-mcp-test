apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bank-ods-graphql
  namespace: bank-ods
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bank-ods-graphql
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up when average CPU across pods exceeds 60%.
          # At 250m limit per pod, that's ~150m — headroom before EOD bursts saturate.
          averageUtilization: 60
