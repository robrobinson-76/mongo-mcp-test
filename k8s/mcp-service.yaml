apiVersion: v1
kind: Service
metadata:
  name: bank-ods-mcp
  namespace: bank-ods
spec:
  selector:
    app: bank-ods-mcp
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
  # ClusterIP — internal dev access only.
  # This service is only meaningful when MCP_TRANSPORT=sse.
  # With stdio transport the port is not used.
  type: ClusterIP
